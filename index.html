<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="description" content="Private gist access — enter your access code to continue." />
  <meta name="theme-color" content="#0d1117" />
  <title>Private gist · Access required</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=mobile-v4" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header id="topbar" class="topbar">
    <div class="topbar-inner">
      <a class="mark" href="./" aria-label="Home">
        <svg class="mark-icon" viewBox="0 0 16 16" width="32" height="32" aria-hidden="true">
          <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <span class="mark-text">gist</span>
      </a>
      <nav class="topbar-nav" aria-label="Primary">
        <span class="nav-item">All gists</span>
        <span class="nav-item">Search</span>
      </nav>
    </div>
  </header>

  <main id="main" class="shell">
    <!-- Access gate (GitHub-style) -->
    <section id="gate" class="gate" aria-labelledby="access-title">
      <div class="access-card">
        <div class="access-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M8 11V8a4 4 0 018 0v3"/>
          </svg>
        </div>
        <h1 id="access-title" class="access-title">This is a private gist</h1>
        <p class="access-lede">Enter the access code shared with you to view this gist.</p>

        <form id="join-form" class="access-form" autocomplete="off">
          <div class="field">
            <label for="room-code">Access code</label>
            <input
              id="room-code"
              name="room-code"
              type="password"
              inputmode="text"
              spellcheck="false"
              autocapitalize="off"
              autocomplete="off"
              minlength="3"
              required
              placeholder="Enter access code"
              aria-describedby="code-hint"
            />
            <p id="code-hint" class="hint">Ask the owner if you don’t have a code.</p>
          </div>
          <p id="gate-error" class="error flash" role="alert" hidden></p>
          <button type="submit" class="btn btn-primary" id="join-btn">View gist</button>
        </form>

        <p class="access-foot">
          Don’t have a code?
          <span class="muted">Ask the gist owner for access.</span>
        </p>
      </div>
    </section>

    <!-- Chat (original Cipher room UI) -->
    <section id="chat" class="chat" hidden aria-labelledby="chat-title">
      <div class="atmosphere" aria-hidden="true"></div>
      <div class="chat-shell">
        <header class="chat-header">
          <div class="chat-header-text">
            <p class="brand brand-sm">❤️Sweet ❤️</p>
            <h2 id="chat-title" class="room-label">Room</h2>
          </div>
          <div class="chat-meta">
            <p id="status" class="status" role="status" aria-live="polite">Connecting…</p>
            <button type="button" class="btn btn-ghost" id="leave-btn">Leave</button>
          </div>
        </header>

        <div
          id="messages"
          class="messages"
          role="log"
          aria-live="polite"
          aria-relevant="additions"
          aria-label="Chat messages"
        ></div>

        <form id="send-form" class="send-form" autocomplete="off">
          <label class="visually-hidden" for="message-input">Message</label>
          <input
            id="message-input"
            name="message"
            type="text"
            maxlength="2000"
            placeholder="Type a message…"
            disabled
            autocomplete="off"
          />
          <button type="submit" class="btn btn-primary" id="send-btn" disabled>Send</button>
        </form>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="app.js?v=mobile-v4"></script>
</body>
</html>
